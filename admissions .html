<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القبول - جامعة المستقبل</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- شريط التنقل -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="شعار الجامعة">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">الصفحة الرئيسية</a></li>
                <li><a href="about.html">عن الجامعة</a></li>
                <li><a href="faculties.html">الكليات</a></li>
                <li><a href="admissions.html">القبول</a></li>
                <li><a href="news.html">الأخبار</a></li>
                <li><a href="research.html">البحث والابتكار</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
            </ul>
        </nav>
    </header>

    <!-- المحتوى الرئيسي -->
    <section id="admissions">
        <h1>القبول والتسجيل</h1>
        <p>للتقديم في الجامعة، يرجى تعبئة النموذج التالي:</p>
        <form>
            <label for="name">الاسم الكامل:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" name="email" required>
            <label for="program">البرنامج المطلوب:</label>
            <select id="program" name="program" required>
                <option value="engineering">كلية الهندسة</option>
                <option value="medicine">كلية الطب</option>
                <option value="arts">كلية الآداب</option>
                <option value="science">كلية العلوم</option>
            </select>
            <button type="submit">إرسال</button>
        </form>
    </section>

    <!-- زر البوت العائم -->
    <div id="chatbot-icon">
        <img src="chatbot-icon.png" alt="الدردشة مع البوت" width="50" height="50">
    </div>

    <!-- نافذة البوت -->
    <div id="chatbot-window">
        <iframe
            src="https://www.chatbase.co/chatbot-iframe/Mo7_FvyLv2JY0TZWqp6Ai"
            width="100%"
            height="100%"
            frameborder="0"
        ></iframe>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
